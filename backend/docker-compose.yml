services:
  postgres:
    image: postgres:16-alpine
    container_name: kelsa-postgres
    environment:
      POSTGRES_USER: kelsa
      POSTGRES_PASSWORD: kelsa_pass
      POSTGRES_DB: kelsa_db
    ports:
      - "5432:5432"
    volumes:
      - kelsa_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kelsa -d kelsa_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kelsa-redis
    ports:
      - "6379:6379"
    volumes:
      - kelsa_redisdata:/data
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  kelsa_pgdata:
  kelsa_redisdata:
